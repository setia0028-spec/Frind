<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="336"
     height="108"
     viewBox="0 0 336 108">

    <defs>

        <linearGradient id="friendGradient"
                        x1="0%"
                        y1="0%"
                        x2="100%"
                        y2="0%">

            <stop offset="0%" stop-color="#3B82F6"/>
            <stop offset="30%" stop-color="#6D28D9"/>
            <stop offset="65%" stop-color="#EC4899"/>
            <stop offset="100%" stop-color="#F59E0B"/>

        </linearGradient>

        <filter id="shadow"
                x="-20%"
                y="-20%"
                width="140%"
                height="160%">

            <feDropShadow
                dx="0"
                dy="2"
                stdDeviation="2"
                flood-opacity="0.18"/>

        </filter>

    </defs>

    <text
        x="18"
        y="73"
        font-family="Poppins, Arial, Helvetica, sans-serif"
        font-size="60"
        font-weight="800"
        letter-spacing="1"
        fill="url(#friendGradient)"
        filter="url(#shadow)">
        Friend
    </text>

</svg>
